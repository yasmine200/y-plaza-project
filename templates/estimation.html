<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Estimation</title>
</head>
<body>
    <h1>Estimateur de prix</h1>
    <form action="/estimer" method="POST">
        <input type="number" name="surface" placeholder="Surface en m²" required>
        <button type="submit">Estimer</button>
    </form>

    {% if prix %}
        <p>Estimation pour {{ surface }}m² : <strong>{{ prix }} €</strong></p>
    {% endif %}
</body>
</html>
