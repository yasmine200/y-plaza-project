<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier le Bien - Y-Plaza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Y-PLAZA</a>
            <a href="/" class="btn btn-outline-light btn-sm">Retour à l'accueil</a>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h1 class="h5 mb-0 fw-bold">Modifier l'annonce : {{ bien.titre }}</h1>
                    </div>
                    <div class="card-body">
                        <form method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Titre</label>
                                <input type="text" class="form-control" name="titre" value="{{ bien.titre }}" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Prix (€)</label>
                                    <input type="number" step="0.01" class="form-control" name="prix" value="{{ bien.prix }}" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">Surface (m²)</label>
                                    <input type="number" class="form-control" name="surface" value="{{ bien.surface }}" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Ville</label>
                                <input type="text" class="form-control" name="ville" value="{{ bien.ville }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" name="description" rows="3">{{ bien.description }}</textarea>
                            </div>
                            
                            <div class="mb-4 border p-3 bg-light rounded">
                                <label class="form-label fw-bold text-warning">📷 Remplacer la photo (Optionnel)</label>
                                <p class="small text-muted mb-2">Image actuelle : <img src="{{ bien.image_url }}" height="40" class="ms-2 rounded"></p>
                                <input type="file" class="form-control" name="image" accept="image/*">
                                <div class="form-text">Si vous ne choisissez rien, l'ancienne photo sera conservée.</div>
                            </div>

                            <button type="submit" class="btn btn-warning w-100 fw-bold">Enregistrer les modifications</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
